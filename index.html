<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <base target="_top">
  <title>HRMS Hidayatullah</title>
  <link rel="icon" href="icon.png">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/globals.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Chart.js for future charts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* Inline minimal setup for loading state before scripts */
    #initial-loader { position: fixed; inset: 0; background: #0a3d2e; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
    .loader-spin { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #84cc16; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-background text-foreground antialiased selection:bg-primary/30 selection:text-primary-foreground min-h-screen flex flex-col">
  
  <div id="initial-loader">
    <div class="loader-spin mb-4"></div>
    <div class="text-sm font-medium">Memuat HRMS...</div>
  </div>

  <div id="main-container" class="flex-1 transition-all duration-300 relative flex">
    
    <!-- LEFT SIDEBAR -->
    <aside id="sidebar" class="fixed top-0 left-0 h-screen w-64 glass border-r z-40 hidden md:flex flex-col">
      <div class="h-16 flex items-center px-6 border-b shrink-0 gap-3">
        <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-primary-foreground">
          <i data-lucide="building-2" class="w-5 h-5"></i>
        </div>
        <span class="font-bold text-lg tracking-tight">HRMS</span>
      </div>
      <div class="p-4 flex-1 overflow-y-auto" id="sidebar-menu">
        <!-- Rendered by router -->
      </div>
      <div class="p-4 border-t shrink-0">
        <button onclick="window.auth.logout()" class="flex items-center gap-3 w-full px-3 py-2 rounded-lg text-sm font-medium text-destructive hover:bg-destructive/10 transition-colors">
          <i data-lucide="log-out" class="w-5 h-5"></i>
          Logout
        </button>
      </div>
    </aside>

    <!-- TOP NAVBAR -->
    <header id="topnav" class="fixed top-0 right-0 left-0 md:left-64 h-16 glass border-b z-30 hidden items-center justify-between px-4 md:px-6 transition-all duration-300">
      <div class="flex items-center gap-4">
        <!-- Mobile Menu Toggle -->
        <button class="md:hidden p-2 -ml-2 text-muted-foreground hover:bg-secondary rounded-lg">
          <i data-lucide="menu" class="w-5 h-5"></i>
        </button>
        <div class="relative hidden sm:block">
          <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-muted-foreground"></i>
          <input type="text" placeholder="Cari data..." class="pl-9 pr-4 py-1.5 bg-secondary border border-border rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-primary w-64 transition-all">
        </div>
      </div>
      
      <div class="flex items-center gap-2 md:gap-4">
        <button class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-secondary text-muted-foreground transition-colors relative">
          <i data-lucide="bell" class="w-5 h-5"></i>
          <span class="absolute top-2 right-2 w-2 h-2 bg-destructive rounded-full border border-background"></span>
        </button>
        <div class="w-px h-6 bg-border mx-1"></div>
        <div class="flex items-center gap-3">
          <div class="text-right hidden sm:block">
            <div class="text-sm font-bold text-foreground" id="nav-user-name">User</div>
            <div class="text-[10px] font-medium text-muted-foreground" id="nav-user-role">Role</div>
          </div>
          <div class="w-9 h-9 rounded-full bg-gradient-to-tr from-primary to-emerald-400 text-white flex items-center justify-center font-bold shadow-sm" id="nav-user-initial">U</div>
        </div>
      </div>
    </header>

    <!-- RIGHT SIDEBAR (For Admin) -->
    <aside id="right-sidebar" class="fixed top-16 right-0 w-80 h-[calc(100vh-4rem)] glass border-l z-20 hidden xl:block overflow-y-auto p-6">
      <div class="space-y-6">
        <div>
          <h3 class="text-xs font-bold tracking-wider text-muted-foreground uppercase mb-4">Pengumuman</h3>
          <div class="space-y-3">
            <div class="bg-primary/10 border border-primary/20 p-3 rounded-xl">
              <div class="text-xs font-bold text-primary mb-1">Rapat Yayasan</div>
              <div class="text-[11px] text-muted-foreground">Jumat, 14:00 WITA. Wajib hadir untuk seluruh unit.</div>
            </div>
          </div>
        </div>
        
        <div>
          <h3 class="text-xs font-bold tracking-wider text-muted-foreground uppercase mb-4">Unit Sekolah</h3>
          <div class="space-y-2">
            <div class="flex items-center justify-between text-sm p-2 hover:bg-secondary rounded-lg cursor-pointer">
              <span class="font-medium text-foreground">SD Integral</span>
              <span class="text-xs bg-emerald-500/10 text-emerald-600 px-2 py-0.5 rounded font-bold">Aktif</span>
            </div>
            <div class="flex items-center justify-between text-sm p-2 hover:bg-secondary rounded-lg cursor-pointer">
              <span class="font-medium text-foreground">MTS-MA Putra</span>
              <span class="text-xs bg-emerald-500/10 text-emerald-600 px-2 py-0.5 rounded font-bold">Aktif</span>
            </div>
            <div class="flex items-center justify-between text-sm p-2 hover:bg-secondary rounded-lg cursor-pointer">
              <span class="font-medium text-foreground">MTS-MA Putri</span>
              <span class="text-xs bg-emerald-500/10 text-emerald-600 px-2 py-0.5 rounded font-bold">Aktif</span>
            </div>
            <div class="flex items-center justify-between text-sm p-2 hover:bg-secondary rounded-lg cursor-pointer">
              <span class="font-medium text-foreground">STIT HISAM</span>
              <span class="text-xs bg-emerald-500/10 text-emerald-600 px-2 py-0.5 rounded font-bold">Aktif</span>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main id="content-area" class="flex-1 w-full min-h-screen transition-all duration-300 flex flex-col">
      <!-- App Router Mount Point -->
      <div id="app-content" class="flex-1 p-4 md:p-6 lg:p-8 mt-0 md:mt-16 w-full max-w-7xl mx-auto relative z-10">
        <!-- JS renders pages here -->
      </div>
    </main>

  </div>

  <!-- GLOBAL COMPONENTS -->
  
  <!-- Loading Overlay -->
  <div id="loading-overlay" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[100] hidden flex-col items-center justify-center">
    <div class="w-12 h-12 border-4 border-muted border-t-primary rounded-full animate-spin mb-4"></div>
    <div id="loading-text" class="text-sm font-medium text-foreground animate-pulse">Memuat...</div>
  </div>

  <!-- Toast Notification -->
  <div id="global-toast" class="fixed top-4 left-1/2 -translate-x-1/2 z-[110] flex items-center gap-3 px-4 py-3 rounded-lg shadow-xl border transform -translate-y-24 opacity-0 pointer-events-none">
    <div id="toast-icon" class="text-lg"></div>
    <div id="toast-text" class="text-sm font-medium"></div>
  </div>

  <!-- Modal Izin (Employee) -->
  <div id="modal-izin" class="fixed inset-0 bg-background/80 backdrop-blur-sm z-[90] hidden items-end sm:items-center justify-center p-4">
    <div class="modal-content w-full max-w-md glass border border-border shadow-2xl rounded-t-2xl sm:rounded-2xl p-6 transform scale-95 opacity-0 transition-all duration-200">
      <div class="flex items-center justify-between mb-4">
        <div>
          <h2 class="text-lg font-bold text-foreground">Ajukan Izin</h2>
          <p class="text-xs text-muted-foreground">Pilih jenis dan berikan keterangan</p>
        </div>
        <button onclick="window.ui.closeModal('modal-izin')" class="p-2 hover:bg-secondary rounded-lg text-muted-foreground">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      
      <div class="grid grid-cols-3 gap-2 mb-4">
        <button id="opt-Sakit" onclick="selectIzinOpt('Sakit')" class="izin-opt-btn flex flex-col items-center justify-center gap-2 p-3 rounded-xl border border-border bg-secondary hover:border-primary/50 transition-all ring-2 ring-primary ring-offset-2 ring-offset-background">
          <span class="text-2xl">🤒</span>
          <span class="text-[10px] font-bold text-foreground">Sakit</span>
        </button>
        <button id="opt-Izin" onclick="selectIzinOpt('Izin')" class="izin-opt-btn flex flex-col items-center justify-center gap-2 p-3 rounded-xl border border-border bg-background hover:border-primary/50 transition-all">
          <span class="text-2xl">🏠</span>
          <span class="text-[10px] font-bold text-muted-foreground">Izin</span>
        </button>
        <button id="opt-Pulang Awal" onclick="selectIzinOpt('Pulang Awal')" class="izin-opt-btn flex flex-col items-center justify-center gap-2 p-3 rounded-xl border border-border bg-background hover:border-primary/50 transition-all">
          <span class="text-2xl">🚪</span>
          <span class="text-[10px] font-bold text-muted-foreground">Pulang Awal</span>
        </button>
      </div>
      
      <div class="mb-6">
        <label class="block text-xs font-bold text-muted-foreground mb-2">KETERANGAN</label>
        <textarea id="izin-keterangan" rows="3" class="w-full px-3 py-2 bg-background border border-border rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary resize-none" placeholder="Tuliskan keterangan detail di sini..."></textarea>
      </div>
      
      <button onclick="submitIzinForm()" class="w-full py-3 bg-primary text-primary-foreground font-bold rounded-xl hover:-translate-y-0.5 transition-all shadow-lg shadow-primary/30">
        Kirim Pengajuan
      </button>
    </div>
  </div>

  <script>
    window.selectedIzinType = 'Sakit';
    function selectIzinOpt(type) {
      window.selectedIzinType = type;
      document.querySelectorAll('.izin-opt-btn').forEach(b => {
        b.classList.remove('bg-secondary', 'ring-2', 'ring-primary', 'ring-offset-2', 'ring-offset-background');
        b.classList.add('bg-background');
        b.querySelector('span:last-child').classList.replace('text-foreground', 'text-muted-foreground');
      });
      const selected = document.getElementById('opt-'+type);
      selected.classList.remove('bg-background');
      selected.classList.add('bg-secondary', 'ring-2', 'ring-primary', 'ring-offset-2', 'ring-offset-background');
      selected.querySelector('span:last-child').classList.replace('text-muted-foreground', 'text-foreground');
    }
    async function submitIzinForm() {
      const ket = document.getElementById('izin-keterangan').value.trim();
      window.ui.showLoading("Mengirim...");
      try {
        const res = await window.api.submitIzin({
          email: window.auth.currentUser.email,
          jenisIzin: window.selectedIzinType,
          keterangan: ket || '-'
        });
        window.ui.hideLoading();
        window.ui.closeModal('modal-izin');
        window.ui.showToast(res.success ? '✅' : '⚠️', res.message, res.success);
        document.getElementById('izin-keterangan').value = '';
      } catch(e) {
        window.ui.hideLoading();
        window.ui.showToast('⚠️', 'Gagal mengirim', false);
      }
    }
  </script>

  <!-- Load Scripts -->
  <script src="js/api.js"></script>
  <script src="js/components/ui.js"></script>
  <script src="js/router.js"></script>
  <script src="js/pages/auth_pages.js"></script>
  <script src="js/pages/attendance.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/auth.js"></script>

  <!-- App Initialization -->
  <script>
    window.onload = function() {
      lucide.createIcons();
      document.getElementById('initial-loader').style.display = 'none';
      
      // Override navigateTo to update user details in navbar
      const originalNav = window.router.navigateTo.bind(window.router);
      window.router.navigateTo = function(routeId) {
        originalNav(routeId);
        if (window.auth.currentUser && routeId !== 'login' && routeId !== 'register') {
          const u = window.auth.currentUser;
          document.getElementById('nav-user-name').innerText = u.name;
          document.getElementById('nav-user-role').innerText = u.role === 'admin' ? 'Administrator' : u.unit;
          document.getElementById('nav-user-initial').innerText = u.name.charAt(0).toUpperCase();
        }
      };

      window.auth.init();
    };
  </script>

</body>
</html>
